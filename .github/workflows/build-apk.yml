name: Construir APK Android
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: INSTALAR LO QUE HACE FALTA, SIN IMPORTAR LO QUE HAYA
        run: |
          npm config set audit false
          npm config set fund false
          npm install --no-audit --no-fund
          npm install --save-dev @capacitor/cli @capacitor/android

      - name: BORRAR Y CREAR ANDROID DE CERO
        run: |
          rm -rf android ios .capacitor
          npx cap init --web-dir "." --app-id "io.github.librepedal" --app-name "Libre Pedal"
          npx cap add android
          npx cap sync android

      - name: MATAR EL 5.3 DEFINITIVAMENTE
        run: |
          sed -i -E 's/versionCode [0-9]+/versionCode 10/' android/app/build.gradle
          sed -i -E 's/versionName "[^"]+"/versionName "5.9.2"/' android/app/build.gradle
          sed -i -E 's/APP_VERSION = "[^"]+"/APP_VERSION = "5.9.2"/' index.html
          sed -i 's/librepedal-v[0-9]*/librepedal-v26/g' index.html sw.js
          echo "5.9.2" > version.txt

      - name: COMPILAR
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      - name: SUBIR
        uses: actions/upload-artifact@v4
        with:
          name: LibrePedal-v5.9.2
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: PUBLICAR
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v5.9.2
          name: Libre Pedal v5.9.2
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
