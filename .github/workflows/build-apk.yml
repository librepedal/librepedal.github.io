name: Construir APK Android
on:
  push:
    branches: [ main ]
  workflow_dispatch

env:
  VER: "5.9.2"
  VC: 10
  ID: "io.github.librepedal"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar paquetes
        run: npm ci || npm install

      - name: Crear proyecto Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Actualizar todas las versiones
        run: |
          sed -i "s/versionCode [0-9]*/versionCode $VC/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VER\"/" android/app/build.gradle
          sed -i "s/APP_VERSION = \".*\"/APP_VERSION = \"$VER\"/" index.html
          sed -i "s/librepedal-v[0-9]*/librepedal-v26/g" index.html sw.js
          echo "$VER" > version.txt

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir archivo
        uses: actions/upload-artifact@v4
        with:
          name: LibrePedal-v${{ env.VER }}
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publicar
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VER }}
          name: Libre Pedal v${{ env.VER }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
