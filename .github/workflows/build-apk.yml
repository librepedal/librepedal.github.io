name: Construir APK Android

on:
  workflow_dispatch:        # permite lanzarlo a mano desde GitHub
  push:
    branches: [ main ]
    paths:                  # solo recompila el APK si cambia algo relevante
      - 'index.html'
      - 'manifest.json'
      - 'icon-192.png'
      - 'icon-512.png'
      - 'resources/**'
      - 'version.txt'
      - 'package.json'
      - 'capacitor.config.json'
      - 'scripts/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # necesario para publicar el APK en Releases
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias
        run: npm install

      - name: Preparar carpeta web (www/)
        run: node scripts/copy-web.js

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Generar ícono y splash desde resources/ (logo real de Libre Pedal)
        run: npx @capacitor/assets generate --android

      - name: Inyectar permisos nativos
        run: node scripts/patch-android.js

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Compilar APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Publicar el APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: LibrePedal-APK
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publicar APK en Releases (enlace de descarga directa y fijo)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "Libre Pedal · Última APK"
          body: "Última versión del APK de Libre Pedal (se actualiza en cada cambio). Descarga el .apk, instálalo, permite ubicación Todo el tiempo y desactiva la optimización de batería."
          files: android/app/build/outputs/apk/debug/*.apk
