<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1d"/>
      <stop offset="1" stop-color="#10203a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f2ff"/>
      <stop offset="1" stop-color="#0aa6c9"/>
    </linearGradient>
  </defs>
  <!-- safe padding for maskable: keep art within central ~80% -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- two wheels -->
  <g fill="none" stroke="url(#ring)" stroke-width="18">
    <circle cx="168" cy="312" r="78"/>
    <circle cx="344" cy="312" r="78"/>
  </g>
  <!-- frame + pedals -->
  <g fill="none" stroke="#00f2ff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M168 312 L256 312 L300 224 L344 312"/>
    <path d="M256 312 L224 224 L300 224"/>
    <path d="M300 224 L320 188"/>
  </g>
  <circle cx="256" cy="312" r="14" fill="#ffd700"/>
  <!-- helmet (Pistero) above -->
  <path d="M196 168 a60 60 0 0 1 120 0 v10 h-120 z" fill="#00f2ff"/>
  <rect x="196" y="176" width="120" height="14" rx="7" fill="#0a0f1d"/>
  <circle cx="232" cy="150" r="9" fill="#0a0f1d"/>
  <circle cx="280" cy="150" r="9" fill="#0a0f1d"/>
</svg>
